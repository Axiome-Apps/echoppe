# Backend Échoppe (API + Admin + base de données) via images publiées.
#
# Le front de CETTE boutique n'est pas ici : c'est le source Astro du repo,
# lancé avec `pnpm dev`. Ce compose ne fait tourner que le backend.
#
# L'API applique elle-même les migrations SQL au démarrage (pas de conteneur
# d'init séparé). Toutes les valeurs configurables viennent du .env (Docker
# Compose le lit automatiquement) ; le câblage interne (noms de services,
# ports conteneur) reste littéral : c'est de la topologie, pas de la config.

services:
  db:
    image: postgres:17-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-echoppe}-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - echoppe-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: axiomeapp/echoppe-api:${ECHOPPE_VERSION:-latest}
    container_name: ${COMPOSE_PROJECT_NAME:-echoppe}-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      ADMIN_URL: http://localhost:${ADMIN_PORT}
      STORE_URL: ${STORE_URL}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    ports:
      - '${API_PORT}:7532'
    volumes:
      - echoppe-uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  admin:
    image: axiomeapp/echoppe-admin:${ECHOPPE_VERSION:-latest}
    container_name: ${COMPOSE_PROJECT_NAME:-echoppe}-admin
    restart: unless-stopped
    ports:
      - '${ADMIN_PORT}:80'
    depends_on:
      - api

volumes:
  echoppe-data:
  echoppe-uploads:
