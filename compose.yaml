# Échoppe - Production Docker Compose (backend : API + Admin + PostgreSQL)
#
# Quick start:
#   curl -O https://raw.githubusercontent.com/Axiome-Apps/echoppe/main/compose.yaml
#
#   # Clé de chiffrement (requise pour les credentials paiement/livraison)
#   export ENCRYPTION_KEY=$(openssl rand -base64 32)
#
#   docker compose up -d
#
# Au premier démarrage, l'API crée le schéma (migrations) puis le compte admin
# à partir de ADMIN_EMAIL/ADMIN_PASSWORD. Le front vit dans son propre repo
# (généré par `create-echoppe`) et pointe sur l'API via son URL.

services:
  db:
    image: postgres:17-alpine
    container_name: echoppe-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: echoppe
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-echoppe}
      POSTGRES_DB: echoppe
    volumes:
      - echoppe-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U echoppe -d echoppe']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: axiomeapp/echoppe-api:${VERSION:-latest}
    container_name: echoppe-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://echoppe:${POSTGRES_PASSWORD:-echoppe}@db:5432/echoppe
      ADMIN_URL: ${ADMIN_URL:-http://localhost:3211}
      STORE_URL: ${STORE_URL:-http://localhost:4321}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@echoppe.dev}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      UPLOAD_DIR: /app/uploads
      # Optionnel : rate-limit distribué (fournir un Redis joignable)
      # REDIS_URL: redis://redis:6379
    ports:
      - '${API_PORT:-7532}:7532'
    volumes:
      - echoppe-uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  admin:
    image: axiomeapp/echoppe-admin:${VERSION:-latest}
    container_name: echoppe-admin
    restart: unless-stopped
    ports:
      - '${ADMIN_PORT:-3211}:80'
    depends_on:
      - api

volumes:
  echoppe-data:
  echoppe-uploads:
