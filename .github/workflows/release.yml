name: Release

# Publication npm des paquets publiables (@echoppe/client, create-echoppe).
#
# Auth : Trusted Publishing (OIDC) — AUCUN token npm. npm échange le jeton
# OIDC de GitHub Actions contre un droit de publication éphémère, à condition
# que le trusted publisher soit configuré côté npmjs.com pour chaque paquet
# (repo Axiome-Apps/echoppe + workflow « release.yml »).
#
# Flux changesets :
#   - push sur main AVEC des changesets  → ouvre/maj la PR « Version Packages ».
#   - merge de cette PR (versions bumpées) → publie via `bun run release`.

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write # commits/tags de la PR de version
  pull-requests: write # PR « Version Packages »
  id-token: write # OIDC pour le trusted publishing npm

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Node 24 : runtime requis pour le handshake OIDC de npm. Sur Node 22, le
      # CLI rate le handshake trusted-publishing → le registre traite la session
      # comme anonyme et renvoie un 404 trompeur sur la résolution de version, ce
      # qui fait croire à changesets qu'aucun paquet n'est publié (il retente
      # alors de republier les versions déjà en ligne → échec). Cf. npm/cli #8678.
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      # npm 11.x : compatible OIDC (>= 11.5.1) ET avec la détection de changesets.
      # PAS npm@latest → tire npm 12, dont la sortie `npm info` casse le
      # `getUnpublishedPackages` de changesets (il croit tout non-publié et
      # retente de republier les versions déjà en ligne). Cf. diagnostic interne.
      - name: Ensure npm supports OIDC
        run: npm install -g npm@11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create Release PR or publish
        uses: changesets/action@v1
        with:
          version: bun run version-packages
          publish: bun run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true" # attestation de provenance (public, OIDC)
