name: Release

# Publication npm des paquets publiables (@echoppe/content, @echoppe/client, create-echoppe) +
# images Docker du runtime (api+admin). Politique de versions : ADR-0023.
#
# Auth npm : Trusted Publishing (OIDC) — AUCUN token. npm échange le jeton OIDC de GitHub Actions
# contre un droit de publication éphémère (trusted publisher configuré côté npmjs.com par paquet).
#
# Deux unités de release INDÉPENDANTES (ADR-0023) :
#   - Packages npm (client/content/cli) → versionnés/publiés par changesets, SANS tag ni Release git
#     (`--no-git-tag`, `createGithubReleases: false`). npm EST leur registre de versions.
#   - Runtime api+admin → seule épine de tags git `v*` (+ GitHub Release). Sa version vient de
#     `apps/api/package.json` (bumpée par changesets, paire `fixed` avec admin).
#
# Flux « one-move » : push main AVEC changesets → PR « Version Packages ». Merge de la PR →
# publie npm (si paquet bumpé) ET/OU tague `v x.y.z` + construit les images (si runtime bumpé,
# gate T2–T5 inclus). Le MERGE est l'unique acte humain.

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write # commits/tags de la PR de version + tag v* + GitHub Release
  pull-requests: write # PR « Version Packages »
  id-token: write # OIDC pour le trusted publishing npm

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      runtime_bumped: ${{ steps.runtime.outputs.bumped }}
      version: ${{ steps.runtime.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Node 24 : runtime requis pour le handshake OIDC de npm. Sur Node 22, le
      # CLI rate le handshake trusted-publishing → le registre traite la session
      # comme anonyme et renvoie un 404 trompeur sur la résolution de version, ce
      # qui fait croire à changesets qu'aucun paquet n'est publié (il retente
      # alors de republier les versions déjà en ligne → échec). Cf. npm/cli #8678.
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      # npm 11.x : compatible OIDC (>= 11.5.1) ET avec la détection de changesets.
      # PAS npm@latest → tire npm 12, dont la sortie `npm info` casse le
      # `getUnpublishedPackages` de changesets (il croit tout non-publié et
      # retente de republier les versions déjà en ligne). Cf. diagnostic interne.
      - name: Ensure npm supports OIDC
        run: npm install -g npm@11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create Release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: bun run version-packages
          publish: bun run release
          createGithubReleases: false # ADR-0023 : pas de Release git par paquet (npm = registre)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true" # attestation de provenance (public, OIDC)

      # Version runtime = `apps/api/package.json` (paire `fixed` avec admin). Un bump runtime ne publie
      # RIEN sur npm (privé) → on ne peut pas se fier à `published` : on détecte le bump par l'ABSENCE
      # du tag `v x.y.z` sur origin. Un push sans release (version inchangée) → tag présent → no-op.
      - name: Resolve runtime version
        id: runtime
        run: |
          VERSION=$(jq -r .version apps/api/package.json)
          if [ -n "$(git ls-remote --tags origin "refs/tags/v${VERSION}")" ]; then
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            echo "Runtime v${VERSION} déjà taggé → aucune nouvelle image."
          else
            echo "bumped=true" >> "$GITHUB_OUTPUT"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "Nouvelle version runtime : v${VERSION}."
          fi

      # Épine produit : tag git `v*` + GitHub Release. Poussé au GITHUB_TOKEN → ne RE-déclenche PAS
      # docker-build (garde anti-récursion GitHub) : les images passent par le job `images` ci-dessous
      # (workflow_call), pas par ce tag.
      - name: Tag & release runtime
        if: steps.runtime.outputs.bumped == 'true'
        env:
          VERSION: ${{ steps.runtime.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
          gh release create "v${VERSION}" --title "v${VERSION}" --verify-tag --latest \
            --notes "Échoppe ${VERSION} — images \`echoppe-api\`/\`echoppe-admin:${VERSION}\`."

  # Images à la version runtime — gate T2–T5 inclus (aucune image cassée ne part). Construit
  # UNIQUEMENT si le runtime a été bumpé (un release npm-seul ne rebâtit pas d'image).
  images:
    needs: release
    if: needs.release.outputs.runtime_bumped == 'true' && needs.release.outputs.version != ''
    uses: ./.github/workflows/docker-build.yml
    with:
      version: ${{ needs.release.outputs.version }}
    secrets: inherit
