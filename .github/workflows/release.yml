name: Release

# Publication npm des paquets publiables (@echoppe/content, @echoppe/client, create-echoppe).
#
# Auth : Trusted Publishing (OIDC) — AUCUN token npm. npm échange le jeton
# OIDC de GitHub Actions contre un droit de publication éphémère, à condition
# que le trusted publisher soit configuré côté npmjs.com pour chaque paquet
# (repo Axiome-Apps/echoppe + workflow « release.yml »).
#
# Flux « one-move » :
#   - push sur main AVEC des changesets  → ouvre/maj la PR « Version Packages ».
#   - merge de cette PR (versions bumpées) → publie npm (`bun run release`), pose le tag `v x.y.z`,
#     puis appelle `docker-build.yml` (job `images`) → images api/admin à la même version, gate
#     T2–T5 inclus. Le MERGE est l'unique acte humain d'une release.

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write # commits/tags de la PR de version
  pull-requests: write # PR « Version Packages »
  id-token: write # OIDC pour le trusted publishing npm

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      version: ${{ steps.release-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Node 24 : runtime requis pour le handshake OIDC de npm. Sur Node 22, le
      # CLI rate le handshake trusted-publishing → le registre traite la session
      # comme anonyme et renvoie un 404 trompeur sur la résolution de version, ce
      # qui fait croire à changesets qu'aucun paquet n'est publié (il retente
      # alors de republier les versions déjà en ligne → échec). Cf. npm/cli #8678.
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      # npm 11.x : compatible OIDC (>= 11.5.1) ET avec la détection de changesets.
      # PAS npm@latest → tire npm 12, dont la sortie `npm info` casse le
      # `getUnpublishedPackages` de changesets (il croit tout non-publié et
      # retente de republier les versions déjà en ligne). Cf. diagnostic interne.
      - name: Ensure npm supports OIDC
        run: npm install -g npm@11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create Release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: bun run version-packages
          publish: bun run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true" # attestation de provenance (public, OIDC)

      # Version de release = celle de @echoppe/client (SDK co-versionné avec l'API). Sert de version
      # d'images. Renseignée uniquement quand un publish a réellement eu lieu (merge de la PR Version).
      - name: Resolve release version
        id: release-version
        if: steps.changesets.outputs.published == 'true'
        env:
          PUBLISHED: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          VERSION=$(echo "$PUBLISHED" | jq -r '.[] | select(.name=="@echoppe/client") | .version')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # Marqueur git lisible de la release (v0.5.0). Poussé au GITHUB_TOKEN → ne RE-déclenche PAS
      # docker-build (garde anti-récursion GitHub) : les images passent par le job `images` ci-dessous
      # (workflow_call), pas par ce tag. Pur traçage.
      - name: Tag release
        if: steps.changesets.outputs.published == 'true' && steps.release-version.outputs.version != ''
        env:
          VERSION: ${{ steps.release-version.outputs.version }}
        run: |
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

  # Release « one-move » : dès qu'un publish npm a eu lieu (merge de la PR Version), on construit et
  # pousse les images à la MÊME version — gate T2–T5 inclus (aucune image cassée ne part). Le merge
  # est donc l'unique acte humain : npm + images en découlent.
  images:
    needs: release
    if: needs.release.outputs.published == 'true' && needs.release.outputs.version != ''
    uses: ./.github/workflows/docker-build.yml
    with:
      version: ${{ needs.release.outputs.version }}
    secrets: inherit
