name: CI

# Garde qualité sur main + PR. Le drift-guard (T1) échoue si le schéma Drizzle
# diverge des migrations committées — c'est ce qui aurait attrapé l'incident 0.4.0
# (colonnes poussées en dev via db:push, jamais générées en migration).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type-check
        run: bun run type-check

      - name: Lint
        run: bun run lint

      # T1 — Garde anti-dérive : le schéma TS doit être entièrement capturé par les
      # migrations committées. `db:generate` est hors-ligne (compare schéma ↔ snapshots),
      # DATABASE_URL est un placeholder requis par drizzle.config mais aucune connexion
      # n'est ouverte. S'il produit un fichier, c'est qu'une migration manque → échec.
      - name: Migration drift guard
        env:
          DATABASE_URL: postgres://placeholder:placeholder@localhost:5432/placeholder
        run: |
          bun run --cwd packages/core db:generate --name=drift_guard
          if ! git diff --quiet --exit-code packages/core/drizzle || [ -n "$(git ls-files --others --exclude-standard packages/core/drizzle)" ]; then
            echo "::error::Dérive schéma ↔ migrations : le schéma Drizzle a changé sans migration générée."
            echo "Lancer 'bun run db:generate' puis committer le .sql + meta/*_snapshot.json."
            git status --short packages/core/drizzle
            exit 1
          fi
          echo "✓ Schéma == migrations, aucune dérive."

  # T2 — Smoke « base vierge depuis les migrations » : Postgres neuf → migrate → les routes
  # clés répondent (/products/ 200 sans 500, /countries/ non vide). Aurait attrapé le 500
  # de l'image 0.4.0 (colonnes manquantes) et le /countries/ vide.
  smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: echoppe
          POSTGRES_PASSWORD: echoppe
          POSTGRES_DB: echoppe
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U echoppe -d echoppe"
          --health-interval 5s --health-timeout 5s --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # SMOKE_DATABASE_URL cible le service Postgres neuf (base vierge). Le wrapper l'utilise
      # tel quel (pas de conteneur éphémère à provisionner en CI).
      - name: Smoke storefront
        env:
          SMOKE_DATABASE_URL: postgresql://echoppe:echoppe@localhost:5432/echoppe
        run: bun run --cwd apps/api test:smoke
