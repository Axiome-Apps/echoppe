name: Build and Push Docker Images

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: axiomeapp/echoppe

jobs:
  # Gate de publication : construit l'image `api` (le Dockerfile réellement publié) et la
  # valide en base vierge ET en upgrade AVANT tout push (T2–T5 du runbook). Si un seul échoue,
  # `build-and-push` ne tourne pas → aucune image cassée ne part sur le registre.
  integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Construit `echoppe-api:integration` (via l'orchestrateur) + T2 (fresh) / T3 (upgrade
      # depuis :latest publié) / T4 (parité contrat) / T5 (idempotence). Docker dispo sur le runner.
      - name: Integration gate (image T2–T5)
        run: bun run --cwd apps/api test:integration

  build-and-push:
    needs: integration
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          # API : binaire natif compilé → multi-arch réel (amd64 + arm64).
          - target: api
            platforms: linux/amd64,linux/arm64
          # Admin : site statique (caddy) → amd64 seul. Le build vite sous émulation arm64
          # coûte ~4 min pour un résultat arch-indépendant ; l'image tourne en émulation
          # négligeable sur un hôte arm64.
          - target: admin
            platforms: linux/amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up QEMU (cross-build arm64)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        env:
          REF: ${{ github.ref }}
        run: echo "VERSION=${REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: ${{ matrix.platforms }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.target }}:${{ steps.version.outputs.VERSION }}
            ${{ env.IMAGE_PREFIX }}-${{ matrix.target }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
